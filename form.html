<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Verificar Código do Pedido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h2 {
      margin-bottom: 1rem;
      color: #333;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 1rem;
    }

    button {
      background-color: #503296;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    button:hover:enabled {
      background-color: #39206c;
    }

    button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }

    .mensagem {
      margin-top: 1rem;
      font-weight: bold;
    }

    .mensagem.sucesso {
      color: #38b97e;
    }

    .mensagem.erro {
      color: #b00020;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Verificar Código do Pedido</h2>
    <input type="text" id="codigo" placeholder="Digite seu código" />
    <button onclick="verificarCodigo()">Verificar</button>
    <div id="mensagem" class="mensagem"></div>
  </div>

  <script>
    function verificarCodigo() {
      const codigo = document.getElementById('codigo').value.trim();
      const mensagem = document.getElementById('mensagem');
      const botao = document.querySelector('button');
      
      mensagem.textContent = '';
      mensagem.className = 'mensagem';
      
      if (!codigo) {
        mensagem.textContent = "Digite um código válido.";
        mensagem.className = 'mensagem erro';
        return;
      }

      botao.disabled = true;

      fetch('verificar-codigo.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'codigo=' + encodeURIComponent(codigo)
      })
      .then(res => res.text())
      .then(res => {
        if (res.trim() === 'sucesso') {
          mensagem.textContent = "✅ Código válido! Acesso liberado.";
          mensagem.className = 'mensagem sucesso';
        } else {
          mensagem.textContent = "❌ " + res;
          mensagem.className = 'mensagem erro';
        }
      })
      .catch(() => {
        mensagem.textContent = "Erro ao verificar o código.";
        mensagem.className = 'mensagem erro';
      })
      .finally(() => {
        botao.disabled = false;
      });
    }
  </script>
</body>
</html>
